name: Release

# Cut a GitHub Release automatically when a version tag (v*) is pushed.
# Release notes are generated by GitHub from the conventional commits
# between the previous tag and this one (--generate-notes). pkg.go.dev
# re-indexes on the tag push independently.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history for accurate generated notes

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes
